<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web4 出金引擎 | wanning出品</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">
    <div class="max-w-4xl mx-auto px-4 py-20">
        <header class="mb-16 border-b border-gray-800 pb-8">
            <h1 class="text-5xl font-bold mb-4 bg-gradient-to-r from-blue-500 to-emerald-500 bg-clip-text text-transparent">
                Web4 HK Exit Engine
            </h1>
            <p class="text-gray-400 text-xl italic">“把数字资产变成你兜里的港币，一步到位。”</p>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="p-6 border border-gray-800 rounded-2xl hover:border-blue-500 transition cursor-pointer">
                <h3 class="text-2xl font-bold mb-2">香港虚拟卡 (RedotPay/OneKey)</h3>
                <p class="text-gray-400 mb-4">适合：日常消费、小额出金。无需香港银行卡。</p>
                <span class="text-blue-500 font-bold">手续费：~1.2% →</span>
            </div>

            <div class="p-6 border border-gray-800 rounded-2xl hover:border-emerald-500 transition cursor-pointer">
                <h3 class="text-2xl font-bold mb-2">持牌交易所 (HashKey/OSL)</h3>
                <p class="text-gray-400 mb-4">适合：大额合规出金。需本人香港银行卡。</p>
                <span class="text-emerald-500 font-bold">手续费：极低 →</span>
            </div>
        </section>

        <footer class="mt-32 text-gray-600 text-sm">
            <p>© 2026 Wan Ning. Powered by AI & Web3 Logic.</p>
        </footer>
    </div>
</body>
</html>
